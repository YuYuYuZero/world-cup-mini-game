<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>怒鸟颠球王 - 2026世界杯</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
canvas { display: block; border-radius: 10px; box-shadow: 0 0 40px rgba(0,0,0,0.5); max-width: 100vw; max-height: 100vh; }
.back { position: fixed; top: 15px; left: 15px; color: #fff; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; z-index: 10; }
.back:hover { background: rgba(255,215,0,0.3); }
</style>
</head>
<body>
<a class="back" href="index.html">← 返回</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 500, H = 700;
canvas.width = W; canvas.height = H;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, dur, type='square', vol=0.1) {
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur);
}
function sndKick() { playSound(500+Math.random()*200, 0.1, 'sine', 0.12); }
function sndCombo() { playSound(800, 0.15, 'sine', 0.1); playSound(1000, 0.1, 'sine', 0.08); }
function sndMiss() { playSound(200, 0.4, 'sawtooth', 0.1); playSound(150, 0.3, 'sine', 0.08); }
function sndRecord() { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playSound(f,0.3,'sine',0.1),i*100)); }

const GROUND = H - 80;
const GRAVITY = 0.22;

let gameState = 'title'; // title, ready, playing, dead
let score = 0;
let bestScore = parseInt(localStorage.getItem('keepup_best')||'0');
let combo = 0;
let maxCombo = 0;
let difficulty = 1;
let particles = [];
let floatingTexts = [];
let shakeX = 0, shakeY = 0;
let bgHue = 200;

// Bird
const bird = {
  x: W/2, y: GROUND - 25, w: 50, h: 50,
  targetX: W/2, jumping: false, jumpFrame: 0,
};

// Ball
const ball = {
  x: W/2, y: 200, vx: 0, vy: 0, r: 18, rot: 0,
  active: false,
};

// Crowd characters at top (background)
let crowdChars = [];
for(let i=0;i<20;i++) {
  crowdChars.push({
    x: i*26+10, y: 20+Math.random()*30,
    color: `hsl(${Math.random()*360},70%,50%)`,
    phase: Math.random()*Math.PI*2,
    size: 6+Math.random()*4,
  });
}

function resetBall() {
  ball.x = W/2 + (Math.random()-0.5)*100;
  ball.y = 200;
  ball.vx = (Math.random()-0.5)*2;
  ball.vy = -2;
  ball.active = true;
  ball.rot = 0;
}

function startGame() {
  score = 0; combo = 0; maxCombo = 0; difficulty = 1;
  bird.x = W/2; bird.targetX = W/2;
  particles = []; floatingTexts = [];
  resetBall();
  gameState = 'playing';
}

function kickBall() {
  if (gameState !== 'playing' || !ball.active) return;

  const dx = ball.x - bird.x;
  const dy = ball.y - (bird.y - 20);
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist > 65) return; // too far

  // Successful kick!
  score++;
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  difficulty = 1 + score * 0.02;

  // Kick physics
  ball.vy = -7 - Math.min(score*0.05, 3);
  ball.vx = (ball.x - bird.x) * 0.08 + (Math.random()-0.5) * (1 + difficulty*0.3);
  ball.rot = ball.vx * 0.1;

  bird.jumping = true;
  bird.jumpFrame = 0;

  sndKick();

  // Combo effects
  if (combo > 0 && combo % 5 === 0) {
    sndCombo();
    addFloatingText(`${combo} COMBO!`, ball.x, ball.y-30, '#ffd700', 28);
    spawnComboParticles(ball.x, ball.y);
  } else if (combo > 0 && combo % 10 === 0) {
    addFloatingText('🔥 ON FIRE!', W/2, H/2, '#ff5252', 36);
  }

  // Score popup
  const bonusText = combo >= 10 ? `+${combo}` : combo >= 5 ? `+${Math.floor(combo/2)}` : '+1';
  addFloatingText(bonusText, ball.x + (Math.random()-0.5)*30, ball.y, '#fff', 18);

  // Small particles on kick
  for(let i=0;i<6;i++) {
    const a = Math.random()*Math.PI*2;
    particles.push({x:ball.x,y:ball.y+ball.r,vx:Math.cos(a)*3,vy:Math.sin(a)*3-1,life:20,color:'#ffd700',size:3});
  }
}

function addFloatingText(text, x, y, color, size) {
  floatingTexts.push({text, x, y, color, size, life: 60, vy: -2});
}

function spawnComboParticles(x, y) {
  const colors = ['#ffd700','#ff5252','#4ecdc4','#ff9800','#e91e63'];
  for(let i=0;i<15;i++) {
    const a = Math.random()*Math.PI*2, sp=3+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:40+Math.random()*20,color:colors[i%colors.length],size:3+Math.random()*4});
  }
}

function drawBackground() {
  bgHue = 200 + Math.sin(Date.now()*0.001)*10;
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,`hsl(${bgHue},60%,25%)`);
  grad.addColorStop(0.6,`hsl(${bgHue+20},50%,35%)`);
  grad.addColorStop(1,`hsl(120,40%,25%)`);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  // Stadium lights
  ctx.fillStyle='rgba(255,255,200,0.03)';
  ctx.beginPath(); ctx.arc(50,0,150,0,Math.PI); ctx.fill();
  ctx.beginPath(); ctx.arc(W-50,0,150,0,Math.PI); ctx.fill();

  // Crowd
  const t = Date.now() * 0.003;
  crowdChars.forEach(c => {
    const wave = Math.sin(t+c.phase)*3;
    ctx.fillStyle = c.color;
    ctx.beginPath(); ctx.arc(c.x, c.y+wave, c.size, 0, Math.PI*2); ctx.fill();
    // mini flag
    if(Math.random()<0.01) c.color = `hsl(${Math.random()*360},70%,50%)`;
  });

  // Ground
  ctx.fillStyle='#2e7d32';
  ctx.fillRect(0, GROUND, W, H-GROUND);
  // Field marking
  ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(W/2, GROUND, 60, Math.PI, 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(W,GROUND); ctx.stroke();

  // World Cup banner
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.fillRect(0, 55, W, 22);
  ctx.fillStyle='rgba(255,215,0,0.6)'; ctx.font='bold 11px Arial'; ctx.textAlign='center';
  ctx.fillText('FIFA WORLD CUP 2026™ · 🇺🇸🇨🇦🇲🇽 · KEEPIE UPPIE CHALLENGE', W/2, 70);
}

function drawBird() {
  const x = bird.x + shakeX, y = bird.y + shakeY;
  const jumpOff = bird.jumping ? Math.sin(bird.jumpFrame*0.3)*15 : 0;
  const by = y - jumpOff;

  ctx.save(); ctx.translate(x, by);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0, y-by+25, 20, 6, 0, 0, Math.PI*2); ctx.fill();

  // Body
  ctx.beginPath(); ctx.arc(0, 0, 22, 0, Math.PI*2);
  ctx.fillStyle='#e53935'; ctx.fill();
  ctx.strokeStyle='#b71c1c'; ctx.lineWidth=2; ctx.stroke();

  // Belly
  ctx.beginPath(); ctx.arc(0, 5, 14, 0, Math.PI);
  ctx.fillStyle='#ffcdd2'; ctx.fill();

  // Eyes
  const lookX = (ball.x - bird.x) * 0.01;
  const lookY = Math.min(0, (ball.y - bird.y) * 0.01);
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-6+lookX, -4+lookY, 5, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6+lookX, -4+lookY, 5, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-5+lookX*2, -3+lookY, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7+lookX*2, -3+lookY, 3, 0, Math.PI*2); ctx.fill();

  // Angry eyebrows
  ctx.strokeStyle='#4a0000'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-12,-11); ctx.lineTo(-4,-7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(12,-11); ctx.lineTo(4,-7); ctx.stroke();

  // Beak
  ctx.fillStyle='#ff8f00';
  ctx.beginPath(); ctx.moveTo(0,3); ctx.lineTo(10,6); ctx.lineTo(0,10); ctx.fill();

  // Tail
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.moveTo(-22,-5); ctx.lineTo(-30,-14); ctx.lineTo(-27,-3); ctx.lineTo(-32,0); ctx.lineTo(-22,3); ctx.fill();

  // Headband (World Cup!)
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(0, -5, 20, -Math.PI*0.8, -Math.PI*0.2); ctx.stroke();

  // Jersey number
  ctx.fillStyle='#fff'; ctx.font='bold 10px Arial'; ctx.textAlign='center';
  ctx.fillText('10', 0, 4);

  ctx.restore();
}

function drawBall() {
  if (!ball.active) return;
  const x = ball.x + shakeX, y = ball.y + shakeY;

  // Shadow
  const shadowScale = 1 - (GROUND - ball.y) / GROUND * 0.5;
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(ball.x, GROUND + 5, ball.r*shadowScale, 5*shadowScale, 0, 0, Math.PI*2); ctx.fill();

  ctx.save(); ctx.translate(x, y); ctx.rotate(ball.rot);

  // Ball body
  ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.stroke();

  // Pentagon pattern
  ctx.fillStyle='#333';
  for(let i=0;i<5;i++) {
    const a = i*Math.PI*2/5 - Math.PI/2 + ball.rot*0.5;
    const px = Math.cos(a)*ball.r*0.5, py = Math.sin(a)*ball.r*0.5;
    ctx.beginPath();
    for(let j=0;j<5;j++) {
      const pa = j*Math.PI*2/5 - Math.PI/2;
      const ppx = px+Math.cos(pa)*ball.r*0.22, ppy = py+Math.sin(pa)*ball.r*0.22;
      j===0 ? ctx.moveTo(ppx,ppy) : ctx.lineTo(ppx,ppy);
    }
    ctx.fill();
  }

  // Shine
  ctx.beginPath(); ctx.arc(-ball.r*0.3, -ball.r*0.3, ball.r*0.25, 0, Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.fill();

  ctx.restore();
}

function drawScore() {
  // Score
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.fillRect(W/2-60, 85, 120, 50);
  ctx.fillStyle='#ffd700'; ctx.font='bold 36px Arial'; ctx.textAlign='center';
  ctx.fillText(score, W/2, 122);

  // Combo
  if (combo >= 3) {
    const pulse = 1 + Math.sin(Date.now()*0.01)*0.1;
    ctx.save(); ctx.translate(W/2, 150); ctx.scale(pulse, pulse);
    ctx.fillStyle = combo >= 10 ? '#ff5252' : combo >= 5 ? '#ff9800' : '#ffc107';
    ctx.font = `bold ${16+Math.min(combo,20)}px Arial`;
    ctx.fillText(`${combo}x COMBO`, 0, 0);
    ctx.restore();
  }

  // Best
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='14px Arial'; ctx.textAlign='right';
  ctx.fillText(`最高: ${bestScore}`, W-20, 100);

  // Difficulty indicator
  const stars = Math.min(5, Math.floor(difficulty));
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='12px Arial'; ctx.textAlign='left';
  ctx.fillText(`难度: ${'⭐'.repeat(stars)}`, 15, 100);
}

function drawFloatingTexts() {
  floatingTexts.forEach(ft => {
    const alpha = ft.life / 60;
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.fillStyle = ft.color;
    ctx.font = `bold ${ft.size}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.restore();
  });
}

function drawTitle() {
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#ffd700'; ctx.font='bold 40px Arial'; ctx.textAlign='center';
  ctx.fillText('⚽ 怒鸟颠球王 ⚽', W/2, H/2-100);

  ctx.fillStyle='#e53935'; ctx.font='bold 24px Arial';
  ctx.fillText('🐦 Red 备战世界杯', W/2, H/2-50);

  ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='16px Arial';
  ctx.fillText('点击/触屏 颠球', W/2, H/2);
  ctx.fillText('球落地就输了！', W/2, H/2+30);

  if (bestScore > 0) {
    ctx.fillStyle='#ffd700'; ctx.font='18px Arial';
    ctx.fillText(`历史最高: ${bestScore}`, W/2, H/2+70);
  }

  ctx.fillStyle='#fff'; ctx.font='bold 20px Arial';
  const pulse = 0.8 + Math.sin(Date.now()*0.005)*0.2;
  ctx.globalAlpha = pulse;
  ctx.fillText('点击开始', W/2, H/2+120);
  ctx.globalAlpha = 1;
}

function drawDead() {
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);

  const isRecord = score > 0 && score >= bestScore;
  ctx.fillStyle = isRecord ? '#ffd700' : '#ff5252';
  ctx.font = 'bold 36px Arial'; ctx.textAlign='center';
  ctx.fillText(isRecord ? '🏆 新纪录！🏆' : '😤 球落地了！', W/2, H/2-80);

  ctx.fillStyle='#fff'; ctx.font='bold 48px Arial';
  ctx.fillText(score, W/2, H/2-20);
  ctx.font='16px Arial'; ctx.fillStyle='rgba(255,255,255,0.5)';
  ctx.fillText('次颠球', W/2, H/2+10);

  if (maxCombo > 2) {
    ctx.fillStyle='#ff9800'; ctx.font='20px Arial';
    ctx.fillText(`最大连击: ${maxCombo}x`, W/2, H/2+45);
  }

  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='14px Arial';
  ctx.fillText(`历史最高: ${bestScore}`, W/2, H/2+75);

  ctx.fillStyle='#fff'; ctx.font='bold 18px Arial';
  ctx.fillText('点击重新开始', W/2, H/2+115);
}

function update() {
  shakeX *= 0.85; shakeY *= 0.85;

  if (gameState !== 'playing') return;

  // Ball physics
  ball.vy += GRAVITY;
  ball.x += ball.vx;
  ball.y += ball.vy;
  ball.rot += ball.vx * 0.05;

  // Wall bounce
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx)*0.8; }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx)*0.8; }

  // Ceiling
  if (ball.y - ball.r < 80) { ball.y = 80 + ball.r; ball.vy = Math.abs(ball.vy)*0.5; }

  // Wind (slight randomness at higher difficulty)
  if (difficulty > 2) {
    ball.vx += (Math.random()-0.5) * 0.05 * difficulty;
  }

  // Bird tracks ball horizontally
  bird.targetX = Math.max(30, Math.min(W-30, ball.x));
  bird.x += (bird.targetX - bird.x) * 0.08;

  // Jump animation
  if (bird.jumping) {
    bird.jumpFrame++;
    if (bird.jumpFrame > 12) { bird.jumping = false; bird.jumpFrame = 0; }
  }

  // Ball hits ground = dead
  if (ball.y + ball.r > GROUND) {
    ball.y = GROUND - ball.r;
    ball.vy = 0; ball.vx = 0;
    ball.active = false;
    gameState = 'dead';
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('keepup_best', bestScore.toString());
      sndRecord();
    } else {
      sndMiss();
    }
    shakeX = 10; shakeY = 10;
  }

  // Particles
  particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life--; return p.life>0; });
  floatingTexts = floatingTexts.filter(ft => { ft.y+=ft.vy; ft.life--; return ft.life>0; });
}

function draw() {
  ctx.save();
  ctx.translate(shakeX, shakeY);
  drawBackground();
  drawBird();
  drawBall();
  ctx.restore();

  particles.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x+shakeX,p.y+shakeY,p.size*(p.life/40),0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  });

  drawFloatingTexts();
  drawScore();

  if (gameState === 'title') drawTitle();
  if (gameState === 'dead') drawDead();
}

function gameLoop() {
  update(); draw();
  requestAnimationFrame(gameLoop);
}

// Input
canvas.addEventListener('click', e => {
  if (gameState === 'title') { startGame(); return; }
  if (gameState === 'dead') { startGame(); return; }
  if (gameState === 'playing') { kickBall(); }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  canvas.dispatchEvent(new MouseEvent('click'));
});

gameLoop();
</script>
</body>
</html>
