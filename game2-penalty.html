<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>点球大战：鸟 vs 猪 - 2026世界杯</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
canvas { display: block; border-radius: 10px; box-shadow: 0 0 40px rgba(0,0,0,0.5); max-width: 100vw; max-height: 100vh; }
.back { position: fixed; top: 15px; left: 15px; color: #fff; text-decoration: none; font-size: 14px; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; z-index: 10; }
.back:hover { background: rgba(255,215,0,0.3); }
</style>
</head>
<body>
<a class="back" href="index.html">← 返回</a>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 560;
canvas.width = W; canvas.height = H;

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, dur, type='square', vol=0.12) {
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.setValueAtTime(freq,audioCtx.currentTime);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur);
}
function sndKick() { playSound(200,0.15,'sawtooth',0.15); playSound(400,0.1,'square',0.08); }
function sndGoal() { [400,500,600,800].forEach((f,i)=>setTimeout(()=>playSound(f,0.3,'sine',0.1),i*80)); }
function sndSave() { playSound(150,0.3,'sawtooth',0.1); }
function sndMiss() { playSound(100,0.4,'sine',0.08); }
function sndWhistle() { playSound(800,0.5,'sine',0.15); setTimeout(()=>playSound(600,0.3,'sine',0.12),200); }
function sndCrowd() { for(let i=0;i<8;i++) setTimeout(()=>playSound(200+Math.random()*300,0.3,'sawtooth',0.03),i*50); }

// Goal dimensions (perspective)
const GOAL_TOP = 140;
const GOAL_BOT = 360;
const GOAL_LEFT = 200;
const GOAL_RIGHT = 600;
const GOAL_H = GOAL_BOT - GOAL_TOP;
const GOAL_W = GOAL_RIGHT - GOAL_LEFT;
const CROSSBAR_Y = GOAL_TOP;

let gameState = 'title'; // title, aiming, shooting, result, pigTurn, pigShoot, pigResult, roundEnd, gameOver
let round = 0;
let birdScore = 0, pigScore = 0;
let birdResults = [];
let pigResults = [];
let aimX = W/2, aimY = (GOAL_TOP+GOAL_BOT)/2;
let power = 0, powerDir = 1;
let ballX, ballY, ballTargetX, ballTargetY, ballVX, ballVY;
let ballSize = 20;
let ballFlying = false;
let pigX, pigY, pigTargetX, pigDiving = false, pigDiveDir = 0;
let resultText = '';
let resultTimer = 0;
let particles = [];
let crowdWave = 0;
let showAim = true;

// Pig goalkeeper for bird's turn
let goalie = { x: W/2, y: GOAL_BOT - 30, targetX: W/2, diving: false, dir: 0, frame: 0 };
// Bird goalkeeper for pig's turn
let birdGoalie = { x: W/2, y: GOAL_BOT - 30, targetX: W/2, diving: false, dir: 0, frame: 0 };

// For pig's penalty turn
let pigBallX, pigBallY, pigBallTargetX, pigBallTargetY;
let pigBallFlying = false;
let birdDiveDir = 0;

function reset() {
  round = 0; birdScore = 0; pigScore = 0;
  birdResults = []; pigResults = [];
  startRound();
}

function startRound() {
  gameState = 'aiming';
  aimX = W/2; aimY = (GOAL_TOP+GOAL_BOT)/2;
  power = 0; powerDir = 1;
  ballX = W/2; ballY = H - 80; ballFlying = false;
  goalie.x = W/2; goalie.y = GOAL_BOT-30; goalie.diving = false; goalie.dir = 0; goalie.frame = 0;
  showAim = true;
  resultText = ''; resultTimer = 0;
}

function startPigTurn() {
  gameState = 'pigTurn';
  pigBallX = W/2; pigBallY = H - 80; pigBallFlying = false;
  birdGoalie.x = W/2; birdGoalie.y = GOAL_BOT-30; birdGoalie.diving = false; birdGoalie.dir = 0; birdGoalie.frame = 0;
  birdDiveDir = 0;
  resultText = '猪猪队罚球 - 选择扑救方向!'; resultTimer = 120;
}

function shootBall() {
  gameState = 'shooting';
  ballTargetX = aimX;
  ballTargetY = aimY;
  ballFlying = true;
  sndKick();

  // Goalkeeper AI - slightly random dive
  const goalCenter = W/2;
  const ballSide = aimX < goalCenter ? -1 : aimX > goalCenter ? 1 : 0;
  const correctGuess = Math.random() < 0.4; // 40% chance goalie guesses right
  goalie.dir = correctGuess ? ballSide : -ballSide;
  if (goalie.dir === 0) goalie.dir = Math.random() < 0.5 ? -1 : 1;
  goalie.diving = true;
  goalie.targetX = goalie.dir < 0 ? GOAL_LEFT + 40 : GOAL_RIGHT - 40;
}

function pigShoot() {
  gameState = 'pigShoot';
  // Pig picks a target
  const targets = [
    { x: GOAL_LEFT + 60, y: GOAL_TOP + 60 },
    { x: GOAL_RIGHT - 60, y: GOAL_TOP + 60 },
    { x: GOAL_LEFT + 80, y: GOAL_BOT - 40 },
    { x: GOAL_RIGHT - 80, y: GOAL_BOT - 40 },
    { x: W/2, y: GOAL_TOP + 40 },
  ];
  const t = targets[Math.floor(Math.random()*targets.length)];
  pigBallTargetX = t.x + (Math.random()-0.5)*40;
  pigBallTargetY = t.y + (Math.random()-0.5)*20;
  pigBallFlying = true;
  sndKick();

  // Bird goalkeeper dives in direction user chose
  birdGoalie.diving = true;
  birdGoalie.dir = birdDiveDir;
  birdGoalie.targetX = birdDiveDir < 0 ? GOAL_LEFT + 40 : birdDiveDir > 0 ? GOAL_RIGHT - 40 : W/2;
}

function checkShootResult() {
  const inGoalX = ballTargetX > GOAL_LEFT + 15 && ballTargetX < GOAL_RIGHT - 15;
  const inGoalY = ballTargetY > GOAL_TOP + 10 && ballTargetY < GOAL_BOT;

  if (!inGoalX || !inGoalY) {
    resultText = '打飞了！😱'; sndMiss();
    birdResults.push(false);
  } else {
    // Check if goalie saves
    const goalieReach = 60;
    const saved = Math.abs(goalie.targetX - ballTargetX) < goalieReach && Math.abs(goalie.y - ballTargetY) < 50;
    if (saved) {
      resultText = '被扑出！🧤'; sndSave();
      birdResults.push(false);
    } else {
      resultText = 'GOAL!!! ⚽🎉'; sndGoal(); sndCrowd();
      birdScore++;
      birdResults.push(true);
      for(let i=0;i<20;i++) {
        particles.push({x:ballTargetX,y:ballTargetY,vx:(Math.random()-0.5)*8,vy:-Math.random()*6,life:50,color:['#ffd700','#ff5252','#4ecdc4'][i%3],size:4+Math.random()*3});
      }
    }
  }
  gameState = 'result'; resultTimer = 100;
}

function checkPigShootResult() {
  const inGoalX = pigBallTargetX > GOAL_LEFT + 15 && pigBallTargetX < GOAL_RIGHT - 15;
  const inGoalY = pigBallTargetY > GOAL_TOP + 10 && pigBallTargetY < GOAL_BOT;

  if (!inGoalX || !inGoalY) {
    resultText = '猪猪打飞了！😂'; sndMiss();
    pigResults.push(false);
  } else {
    const goalieReach = 65;
    const saved = birdGoalie.diving && Math.abs(birdGoalie.targetX - pigBallTargetX) < goalieReach && Math.abs(birdGoalie.y - pigBallTargetY) < 50;
    if (saved) {
      resultText = '扑出！漂亮！🐦🧤'; sndSave(); sndCrowd();
      pigResults.push(false);
    } else {
      resultText = '猪猪进球...😤'; sndGoal();
      pigScore++;
      pigResults.push(true);
    }
  }
  gameState = 'pigResult'; resultTimer = 100;
}

function nextRound() {
  round++;
  // Check if game can be decided early
  const roundsLeft = 5 - round;
  if (round >= 5) {
    if (birdScore !== pigScore) { endGame(); return; }
    // Sudden death continues
  } else if (round < 5) {
    // Can one side no longer catch up?
    if (birdScore > pigScore + roundsLeft) { endGame(); return; }
    if (pigScore > birdScore + roundsLeft) { endGame(); return; }
  }
  if (round >= 5 && birdResults.length === pigResults.length && birdScore !== pigScore) {
    endGame(); return;
  }
  startRound();
}

function endGame() {
  gameState = 'gameOver';
  sndWhistle();
  if (birdScore > pigScore) {
    setTimeout(()=>{ for(let i=0;i<5;i++) setTimeout(()=>sndCrowd(),i*200); }, 500);
  }
}

// Drawing
function drawField() {
  // sky
  const skyGrad = ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,'#0d47a1'); skyGrad.addColorStop(0.3,'#1976d2'); skyGrad.addColorStop(0.7,'#43a047');
  ctx.fillStyle=skyGrad; ctx.fillRect(0,0,W,H);

  // stadium crowd (animated)
  crowdWave += 0.03;
  for(let x=0;x<W;x+=8) {
    const wave = Math.sin(x*0.05+crowdWave)*5;
    const h = 60 + wave;
    ctx.fillStyle = `hsl(${(x*0.5)%360}, 60%, ${35+Math.sin(x*0.1+crowdWave*2)*10}%)`;
    ctx.fillRect(x, 65-h*0.3, 7, h*0.3);
  }

  // field
  ctx.fillStyle='#388e3c';
  ctx.fillRect(0, GOAL_BOT + 20, W, H - GOAL_BOT - 20);
  // field gradient
  const fieldGrad = ctx.createLinearGradient(0, GOAL_BOT+20, 0, H);
  fieldGrad.addColorStop(0,'#43a047'); fieldGrad.addColorStop(1,'#2e7d32');
  ctx.fillStyle=fieldGrad; ctx.fillRect(0,GOAL_BOT+20,W,H-GOAL_BOT-20);

  // penalty spot
  ctx.beginPath(); ctx.arc(W/2, H-80, 4, 0, Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();

  // penalty area lines
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=2;
  ctx.strokeRect(GOAL_LEFT-60, GOAL_BOT+20, GOAL_W+120, 40);
}

function drawGoalPosts() {
  // Goal net
  ctx.fillStyle='rgba(255,255,255,0.08)';
  ctx.fillRect(GOAL_LEFT, GOAL_TOP, GOAL_W, GOAL_H);

  // Net lines
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
  for(let x=GOAL_LEFT;x<=GOAL_RIGHT;x+=25) {
    ctx.beginPath(); ctx.moveTo(x,GOAL_TOP); ctx.lineTo(x,GOAL_BOT); ctx.stroke();
  }
  for(let y=GOAL_TOP;y<=GOAL_BOT;y+=25) {
    ctx.beginPath(); ctx.moveTo(GOAL_LEFT,y); ctx.lineTo(GOAL_RIGHT,y); ctx.stroke();
  }

  // Posts
  ctx.fillStyle='#fff'; ctx.shadowColor='rgba(0,0,0,0.3)'; ctx.shadowBlur=5;
  ctx.fillRect(GOAL_LEFT-5, GOAL_TOP, 8, GOAL_H); // left post
  ctx.fillRect(GOAL_RIGHT-3, GOAL_TOP, 8, GOAL_H); // right post
  ctx.fillRect(GOAL_LEFT-5, GOAL_TOP-6, GOAL_W+13, 8); // crossbar
  ctx.shadowBlur=0;
}

function drawBirdChar(x, y, scale, isGoalie) {
  const s = scale || 1;
  ctx.save(); ctx.translate(x, y);
  // body
  ctx.beginPath(); ctx.arc(0,0,20*s,0,Math.PI*2);
  ctx.fillStyle='#e53935'; ctx.fill(); ctx.strokeStyle='#b71c1c'; ctx.lineWidth=2; ctx.stroke();
  // belly
  ctx.beginPath(); ctx.arc(0,5*s,12*s,0,Math.PI);
  ctx.fillStyle='#ffcdd2'; ctx.fill();
  // eyes
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.ellipse(-5*s,-3*s,4*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(5*s,-3*s,4*s,5*s,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-4*s,-3*s,2*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6*s,-3*s,2*s,0,Math.PI*2); ctx.fill();
  // brows
  ctx.strokeStyle='#4a0000'; ctx.lineWidth=2.5*s; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-10*s,-9*s); ctx.lineTo(-3*s,-6*s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10*s,-9*s); ctx.lineTo(3*s,-6*s); ctx.stroke();
  // beak
  ctx.fillStyle='#ff8f00';
  ctx.beginPath(); ctx.moveTo(0,2*s); ctx.lineTo(8*s,5*s); ctx.lineTo(0,8*s); ctx.fill();
  // jersey
  ctx.fillStyle='#fff'; ctx.font=`bold ${8*s}px Arial`; ctx.textAlign='center';
  ctx.fillText(isGoalie?'1':'10', 0, 3*s);
  if (isGoalie) {
    // gloves
    ctx.fillStyle='#ff9800';
    ctx.fillRect(-24*s,5*s,8*s,12*s);
    ctx.fillRect(16*s,5*s,8*s,12*s);
  }
  ctx.restore();
}

function drawPigChar(x, y, scale, isGoalie) {
  const s = scale || 1;
  ctx.save(); ctx.translate(x,y);
  ctx.beginPath(); ctx.arc(0,0,22*s,0,Math.PI*2);
  ctx.fillStyle='#4caf50'; ctx.fill(); ctx.strokeStyle='#2e7d32'; ctx.lineWidth=2; ctx.stroke();
  // ears
  ctx.fillStyle='#4caf50';
  ctx.beginPath(); ctx.arc(-18*s,-14*s,6*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(18*s,-14*s,6*s,0,Math.PI*2); ctx.fill(); ctx.stroke();
  // snout
  ctx.beginPath(); ctx.ellipse(0,5*s,10*s,7*s,0,0,Math.PI*2);
  ctx.fillStyle='#66bb6a'; ctx.fill(); ctx.stroke();
  ctx.fillStyle='#2e7d32';
  ctx.beginPath(); ctx.arc(-3*s,5*s,2*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3*s,5*s,2*s,0,Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-7*s,-5*s,5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7*s,-5*s,5*s,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath(); ctx.arc(-6*s,-5*s,2.5*s,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8*s,-5*s,2.5*s,0,Math.PI*2); ctx.fill();
  if (isGoalie) {
    ctx.fillStyle='#ff9800';
    ctx.fillRect(-28*s,5*s,8*s,12*s);
    ctx.fillRect(20*s,5*s,8*s,12*s);
    // cap
    ctx.fillStyle='#ff9800';
    ctx.beginPath(); ctx.arc(0,-18*s,12*s,Math.PI,0); ctx.fill();
  }
  ctx.restore();
}

function drawBall(x, y, r) {
  ctx.save();
  ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#333'; ctx.lineWidth=1.5; ctx.stroke();
  // pentagon pattern
  ctx.fillStyle='#333';
  for(let i=0;i<5;i++) {
    const a = i*Math.PI*2/5 - Math.PI/2;
    ctx.beginPath();
    ctx.arc(x+Math.cos(a)*r*0.45, y+Math.sin(a)*r*0.45, r*0.2, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawAimCursor() {
  if (!showAim || gameState !== 'aiming') return;
  ctx.save();
  ctx.strokeStyle='rgba(255,50,50,0.6)'; ctx.lineWidth=2; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.arc(aimX, aimY, 15, 0, Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(aimX-20,aimY); ctx.lineTo(aimX+20,aimY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(aimX,aimY-20); ctx.lineTo(aimX,aimY+20); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawPowerBar() {
  if (gameState !== 'aiming') return;
  const barX = 30, barY = 150, barW = 20, barH = 250;
  ctx.fillStyle='rgba(0,0,0,0.4)';
  ctx.fillRect(barX-2, barY-2, barW+4, barH+4);
  // gradient bar
  const grad = ctx.createLinearGradient(0,barY+barH,0,barY);
  grad.addColorStop(0,'#4caf50'); grad.addColorStop(0.5,'#ffc107'); grad.addColorStop(1,'#f44336');
  ctx.fillStyle=grad; ctx.fillRect(barX, barY, barW, barH);
  // power level
  const filled = power * barH;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(barX, barY, barW, barH - filled);
  // marker
  ctx.fillStyle='#fff';
  ctx.fillRect(barX-5, barY+barH-filled-2, barW+10, 4);
  ctx.fillStyle='#fff'; ctx.font='bold 12px Arial'; ctx.textAlign='center';
  ctx.fillText('力度', barX+barW/2, barY-10);
}

function drawScoreboard() {
  const sbW = 300, sbH = 50;
  const sbX = (W-sbW)/2, sbY = 10;
  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(sbX, sbY, sbW, sbH);
  ctx.strokeStyle='#ffd700'; ctx.lineWidth=2;
  ctx.strokeRect(sbX, sbY, sbW, sbH);

  // Bird side
  ctx.fillStyle='#e53935'; ctx.font='bold 14px Arial'; ctx.textAlign='center';
  ctx.fillText('怒鸟队 🐦', sbX+75, sbY+20);
  ctx.fillStyle='#fff'; ctx.font='bold 24px Arial';
  ctx.fillText(birdScore, sbX+75, sbY+44);

  // VS
  ctx.fillStyle='#ffd700'; ctx.font='bold 16px Arial';
  ctx.fillText('VS', sbX+sbW/2, sbY+33);

  // Pig side
  ctx.fillStyle='#4caf50'; ctx.font='bold 14px Arial';
  ctx.fillText('猪猪队 🐷', sbX+sbW-75, sbY+20);
  ctx.fillStyle='#fff'; ctx.font='bold 24px Arial';
  ctx.fillText(pigScore, sbX+sbW-75, sbY+44);

  // Round
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='12px Arial';
  ctx.fillText(`第 ${Math.min(round+1, 5)}/5 轮${round>=5?' (加时)':''}`, sbX+sbW/2, sbY+50+15);

  // Results indicators
  for(let i=0;i<Math.max(5,birdResults.length);i++) {
    const rx = sbX+20+i*22;
    ctx.beginPath(); ctx.arc(rx, sbY+sbH+30, 7, 0, Math.PI*2);
    if (i<birdResults.length) {
      ctx.fillStyle = birdResults[i] ? '#4caf50' : '#f44336';
      ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 10px Arial';
      ctx.fillText(birdResults[i]?'✓':'✗', rx, sbY+sbH+33);
    } else {
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.stroke();
    }
  }
  for(let i=0;i<Math.max(5,pigResults.length);i++) {
    const rx = sbX+sbW-20-i*22;
    ctx.beginPath(); ctx.arc(rx, sbY+sbH+30, 7, 0, Math.PI*2);
    if (i<pigResults.length) {
      ctx.fillStyle = pigResults[i] ? '#4caf50' : '#f44336';
      ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 10px Arial';
      ctx.fillText(pigResults[i]?'✓':'✗', rx, sbY+sbH+33);
    } else {
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.stroke();
    }
  }
}

function drawInstructions() {
  if (gameState === 'aiming') {
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(W/2-140, H-40, 280, 30);
    ctx.fillStyle='#fff'; ctx.font='14px Arial'; ctx.textAlign='center';
    ctx.fillText('移动鼠标瞄准 → 点击射门！', W/2, H-20);
  } else if (gameState === 'pigTurn') {
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(W/2-160, H-40, 320, 30);
    ctx.fillStyle='#fff'; ctx.font='14px Arial'; ctx.textAlign='center';
    ctx.fillText('猪猪射门！点击左/右选择扑救方向', W/2, H-20);

    // Dive direction buttons
    ctx.fillStyle='rgba(255,152,0,0.7)';
    ctx.fillRect(GOAL_LEFT-40, GOAL_TOP+GOAL_H/2-30, 80, 60);
    ctx.fillRect(GOAL_RIGHT-40, GOAL_TOP+GOAL_H/2-30, 80, 60);
    ctx.fillStyle='#fff'; ctx.font='bold 16px Arial'; ctx.textAlign='center';
    ctx.fillText('← 扑左', GOAL_LEFT, GOAL_TOP+GOAL_H/2+5);
    ctx.fillText('扑右 →', GOAL_RIGHT, GOAL_TOP+GOAL_H/2+5);
    // center option
    ctx.fillStyle='rgba(255,152,0,0.5)';
    ctx.fillRect(W/2-40, GOAL_BOT-50, 80, 40);
    ctx.fillStyle='#fff'; ctx.font='bold 14px Arial';
    ctx.fillText('站中间', W/2, GOAL_BOT-25);
  }
}

function drawResult() {
  if (!resultText) return;
  const alpha = resultTimer > 20 ? 1 : resultTimer/20;
  ctx.save(); ctx.globalAlpha = alpha;
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(W/2-150, H/2-80, 300, 60);
  ctx.fillStyle='#ffd700'; ctx.font='bold 30px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(resultText, W/2, H/2-50);
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  const winner = birdScore > pigScore;
  ctx.fillStyle = winner ? '#ffd700' : '#ff5252';
  ctx.font='bold 40px Arial'; ctx.textAlign='center';
  ctx.fillText(winner ? '🏆 怒鸟队获胜！🏆' : '😤 猪猪队获胜...', W/2, H/2-60);
  ctx.fillStyle='#fff'; ctx.font='24px Arial';
  ctx.fillText(`${birdScore} : ${pigScore}`, W/2, H/2-10);
  if (winner) {
    ctx.fillStyle='rgba(255,215,0,0.7)'; ctx.font='18px Arial';
    ctx.fillText('怒鸟队勇夺2026世界杯冠军！🎉', W/2, H/2+30);
  }
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='16px Arial';
  ctx.fillText('点击重新开始', W/2, H/2+70);
}

function drawTitle() {
  ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffd700'; ctx.font='bold 42px Arial'; ctx.textAlign='center';
  ctx.fillText('⚽ 点球大战 ⚽', W/2, H/2-80);
  ctx.fillStyle='#e53935'; ctx.font='bold 28px Arial';
  ctx.fillText('🐦 怒鸟队  VS  猪猪队 🐷', W/2, H/2-30);
  ctx.fillStyle='rgba(255,255,255,0.6)'; ctx.font='16px Arial';
  ctx.fillText('2026 FIFA World Cup™ 决赛', W/2, H/2+10);
  ctx.fillStyle='#fff'; ctx.font='18px Arial';
  ctx.fillText('点击开始比赛', W/2, H/2+60);
  // flags
  ctx.font='30px Arial';
  ctx.fillText('🇺🇸 🇨🇦 🇲🇽', W/2, H/2+100);
}

let shootAnimProgress = 0;

function update() {
  particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; return p.life>0; });

  if (gameState === 'aiming') {
    power += 0.015 * powerDir;
    if (power >= 1) { power = 1; powerDir = -1; }
    if (power <= 0) { power = 0; powerDir = 1; }
  }

  if (gameState === 'shooting') {
    shootAnimProgress += 0.04;
    if (shootAnimProgress < 1) {
      const t = shootAnimProgress;
      const eased = 1 - Math.pow(1-t, 3);
      ballX = W/2 + (ballTargetX - W/2) * eased;
      ballY = (H-80) + (ballTargetY - (H-80)) * eased - Math.sin(t*Math.PI)*80;
      ballSize = 20 - eased * 8;
    }
    // goalie dive
    if (goalie.diving) {
      goalie.x += (goalie.targetX - goalie.x) * 0.08;
      goalie.frame++;
    }
    if (shootAnimProgress >= 1) {
      checkShootResult();
      shootAnimProgress = 0;
    }
  }

  if (gameState === 'pigShoot') {
    shootAnimProgress += 0.035;
    if (shootAnimProgress < 1) {
      const t = shootAnimProgress;
      const eased = 1 - Math.pow(1-t, 3);
      pigBallX = W/2 + (pigBallTargetX - W/2) * eased;
      pigBallY = (H-80) + (pigBallTargetY - (H-80)) * eased - Math.sin(t*Math.PI)*80;
    }
    if (birdGoalie.diving) {
      birdGoalie.x += (birdGoalie.targetX - birdGoalie.x) * 0.08;
      birdGoalie.frame++;
    }
    if (shootAnimProgress >= 1) {
      checkPigShootResult();
      shootAnimProgress = 0;
    }
  }

  if (gameState === 'result' || gameState === 'pigResult') {
    resultTimer--;
    if (resultTimer <= 0) {
      if (gameState === 'result') {
        startPigTurn();
      } else {
        nextRound();
      }
    }
  }
}

function draw() {
  drawField();
  drawGoalPosts();

  // Draw characters based on state
  if (gameState === 'aiming' || gameState === 'shooting' || gameState === 'result') {
    // Pig goalie
    const gx = goalie.x, gy = goalie.y;
    drawPigChar(gx, gy, 1, true);
    // Bird striker (at penalty spot)
    if (gameState === 'aiming') {
      drawBirdChar(W/2, H-70, 1.2, false);
    }
    drawBall(ballX, ballY, ballSize);
  } else if (gameState === 'pigTurn' || gameState === 'pigShoot' || gameState === 'pigResult') {
    // Bird goalie
    drawBirdChar(birdGoalie.x, birdGoalie.y, 1, true);
    // Pig striker
    if (gameState === 'pigTurn') {
      drawPigChar(W/2, H-70, 1.2, false);
    }
    drawBall(pigBallX || W/2, pigBallY || H-80, 16);
  }

  // particles
  particles.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*(p.life/50),0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.fill();
  });

  drawAimCursor();
  drawPowerBar();
  drawScoreboard();
  drawInstructions();
  drawResult();

  if (gameState === 'title') drawTitle();
  if (gameState === 'gameOver') drawGameOver();
}

function gameLoop() {
  update(); draw();
  requestAnimationFrame(gameLoop);
}

// Input
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return { x: (touch.clientX-rect.left)*W/rect.width, y: (touch.clientY-rect.top)*H/rect.height };
}

canvas.addEventListener('mousemove', e => {
  if (gameState !== 'aiming') return;
  const p = getPos(e);
  aimX = Math.max(GOAL_LEFT+10, Math.min(GOAL_RIGHT-10, p.x));
  aimY = Math.max(GOAL_TOP+10, Math.min(GOAL_BOT-10, p.y));
});

canvas.addEventListener('click', e => {
  const p = getPos(e);
  if (gameState === 'title') { reset(); return; }
  if (gameState === 'gameOver') { reset(); return; }
  if (gameState === 'aiming') {
    shootBall();
    return;
  }
  if (gameState === 'pigTurn') {
    if (p.x < W/2 - 40) { birdDiveDir = -1; }
    else if (p.x > W/2 + 40) { birdDiveDir = 1; }
    else { birdDiveDir = 0; }
    pigShoot();
  }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const p = getPos(e);
  if (gameState === 'title' || gameState === 'gameOver') { canvas.dispatchEvent(new MouseEvent('click', {clientX:e.touches[0].clientX,clientY:e.touches[0].clientY})); return; }
  if (gameState === 'aiming') {
    aimX = Math.max(GOAL_LEFT+10, Math.min(GOAL_RIGHT-10, p.x));
    aimY = Math.max(GOAL_TOP+10, Math.min(GOAL_BOT-10, p.y));
    shootBall();
  }
  if (gameState === 'pigTurn') {
    if (p.x < W/2 - 40) birdDiveDir = -1;
    else if (p.x > W/2 + 40) birdDiveDir = 1;
    else birdDiveDir = 0;
    pigShoot();
  }
});

ballX = W/2; ballY = H-80;
gameLoop();
</script>
